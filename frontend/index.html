<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Condomínio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📊 Análise de Balancete</h1>

    <input type="file" id="file">
    <button onclick="enviar()">Analisar</button>

    <div class="cards">
        <div class="card">
            <h3>Score</h3>
            <p id="score">-</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p id="status">-</p>
        </div>

        <div class="card">
            <h3>Compras > 10k</h3>
            <p id="compras">0</p>
        </div>

        <div class="card">
            <h3>Inconsistências</h3>
            <p id="inconsistencias">0</p>
        </div>
    </div>

    <h3>Detalhes</h3>
    <pre id="detalhes"></pre>
</div>

<script src="app.js"></script>

</body>
</html>
